<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPO Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="hod-page">
        <header class="hod-topbar">
            <div class="hod-brand">
                <img src="/logo.png" alt="ODPC logo" class="hod-logo">
                <div>
                    <p class="hod-eyebrow">Office of the Data Protection Commissioner</p>
                    <h1>Data Protection Officer Dashboard</h1>
                </div>
            </div>
            <a href="/login" class="hod-logout-btn">Logout</a>
        </header>

        <div class="hod-layout">
            <aside class="hod-sidebar">
                <nav class="hod-nav">
                    <button class="hod-nav-button active" data-tab="assigned-enquiries">Assigned Enquiries</button>
                </nav>
            </aside>

            <main class="hod-main">
                <section id="assigned-enquiries" class="hod-panel">
                    <div class="hod-panel-header">
                        <div>
                            <h2>Assigned Enquiries</h2>
                            <p>Review assigned enquiries, deadlines, advisory status, and draft responses.</p>
                        </div>
                    </div>
                     <div class="hod-filters">
                         <button type="button" onclick="filterCards('all')">All</button>
                         <button type="button" onclick="filterCards('Not reviewed')">Not Reviewed</button>
                         <button type="button" onclick="filterCards('Pending')">Pending Review</button>
                         <button type="button" onclick="filterCards('Needs Revision')">Needs Revision</button>
                         <button type="button" onclick="filterCards('Approved')">Approved</button>
                     </div>
                    <div class="hod-workload-list">
                        {{dpo_enquiries}}
                    </div>
                </section>
            </main>
             
        </div>
        <footer class="footer">
            © 2025 Office of the Data Protection Commissioner, Kenya
        </footer>
    </div>

    <script src="/main.js" defer></script>
</body>
</html>
