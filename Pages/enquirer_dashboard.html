<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquirer Dashboard - ODPC</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="page-shell">
        <header class="header">
            <img src="/logo.png" alt="ODPC logo" class="logo">
            <h1>My Enquiries</h1>
        </header>
        <main class="container">
            <section class="card">
                <h2>Your Enquiries</h2>
<div id="enquiries">
                    <!-- Dynamic load by /enquirer_dashboard -->
                </div>
                <div class="item-actions">
                    <a href="/submit_enquiry"><button>New Enquiry</button></a>
                    <a href="/enquirer_logout"><button>Logout</button></a>
                </div>
            </section>
        </main>
        <footer class="footer">
            © 2025 Office of the Data Protection Commissioner, Kenya
        </footer>
    </div>
</body>
</html>
